name: Build Extension

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*' # This will trigger on any tag that starts with 'v', like v0.1.1
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Get version from tag
      if: startsWith(github.ref, 'refs/tags/')
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV
        
    - name: Create build directory
      run: mkdir -p build
      
    - name: Copy extension files
      run: |
        cp manifest.json build/
        cp background.js build/
        cp content.js build/
        cp content.css build/
        cp popup.html build/
        cp popup.js build/
        cp -r images build/
        
    - name: Create ZIP file
      working-directory: build
      run: |
        if [[ -n "$VERSION" ]]; then
          zip -r ../translate-with-context-${{ env.VERSION }}.zip .
        else
          zip -r ../translate-with-context.zip .
        fi
      
    - name: Upload extension ZIP as artifact
      uses: actions/upload-artifact@v4
      with:
        name: translate-with-context
        path: translate-with-context*.zip
        retention-days: 7
        
    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: translate-with-context-${{ env.VERSION }}.zip
        draft: false
        prerelease: false
        name: Translate With Context v${{ env.VERSION }}
        body: |
          Translate With Context browser extension v${{ env.VERSION }}
          
          This extension translates selected words within their full context using OpenAI's GPT.
        token: ${{ secrets.GITHUB_TOKEN }} 